# mcp-multi-model 配置文件
# 添加新模型只需在 models 下新增一项，支持 openai / gemini 两种 adapter

defaults:
  max_tokens: 4000
  temperature: 0.7
  timeout_ms: 60000
  max_retries: 2
  # cache_ttl_ms: 300000   # Cache identical prompts for 5 minutes (0 = disabled)
  # daily_budget_usd: 5.0  # Daily spending limit in USD (omit = unlimited)

models:
  deepseek:
    name: DeepSeek
    adapter: openai
    endpoint: https://api.deepseek.com/chat/completions
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat
    description: "向 DeepSeek 发送请求。擅长：中文内容、代码、数学、逻辑。成本低。"
    fallback_to: gemini     # Auto-fallback to Gemini if DeepSeek fails
    pricing:
      input: 0.14    # $/M tokens
      output: 0.28   # $/M tokens

  gemini:
    name: Gemini
    adapter: gemini
    endpoint: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    model: gemini-3-flash-preview
    description: "向 Gemini 发送请求。擅长：长文档、知识广度、创意写作。已启用 Google Search 联网。"
    fallback_to: deepseek   # Auto-fallback to DeepSeek if Gemini fails
    features:
      - google_search
    pricing:
      input: 0.10    # $/M tokens
      output: 0.40   # $/M tokens

  kimi:
    name: Kimi
    adapter: openai
    endpoint: https://api.moonshot.cn/v1/chat/completions
    api_key_env: KIMI_API_KEY
    model: moonshot-v1-auto
    description: "向 Kimi (Moonshot) 发送请求。擅长：中文联网搜索、实时信息、国内资讯。"
    system_prefix: "你是 Kimi，擅长联网搜索。当用户的问题涉及实时信息、最新数据、当前时间日期等内容时，请主动使用联网搜索工具获取最新结果。"
    features:
      - web_search
    tool_loop_max: 5
    pricing:
      input: 1.00    # $/M tokens
      output: 1.00   # $/M tokens

  # ── Image generation (Gemini Nano Banana) ──
  # Uses the same GEMINI_API_KEY. Uncomment to enable generate_image tool.
  #
  # gemini-image:
  #   name: Gemini Image
  #   adapter: gemini
  #   endpoint: https://generativelanguage.googleapis.com/v1beta
  #   api_key_env: GEMINI_API_KEY
  #   model: gemini-2.5-flash-image
  #   description: "Generate images with Gemini 2.5 Flash Image. Fast, low cost."
  #   image_generation: true
  #   pricing:
  #     input: 0.10
  #     output: 0.40

  # ── Local models (Ollama / LM Studio / llama.cpp) ──
  # Uncomment and adjust to use local models. No API key needed.
  #
  # ollama:
  #   name: Ollama
  #   adapter: openai
  #   endpoint: http://localhost:11434/v1/chat/completions
  #   model: llama3.2
  #   description: "Local Ollama model. No API key, no cost, full privacy."
  #   pricing:
  #     input: 0
  #     output: 0
  #
  # lmstudio:
  #   name: LM Studio
  #   adapter: openai
  #   endpoint: http://localhost:1234/v1/chat/completions
  #   model: loaded-model
  #   description: "Local LM Studio model."
  #   pricing:
  #     input: 0
  #     output: 0

# 特殊工具配置
tools:
  translate:
    model: deepseek
    description: "用 DeepSeek 做中英互译，质量高成本低。"
  research:
    model: gemini
    description: "用 Gemini 做技术调研和分析总结（已联网）。"
