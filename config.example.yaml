# mcp-multi-model 配置文件
# 添加新模型只需在 models 下新增一项，支持 openai / gemini 两种 adapter
# 未设置对应 api_key 的模型会在启动时自动跳过，所以这里可以把所有主流模型都预置好

defaults:
  max_tokens: 4000
  temperature: 0.7
  timeout_ms: 60000
  max_retries: 2
  # cache_ttl_ms: 300000   # Cache identical prompts for 5 minutes (0 = disabled)
  # daily_budget_usd: 5.0  # Daily spending limit in USD (omit = unlimited)

models:
  # ── OpenAI (GPT) ──
  openai:
    name: OpenAI
    adapter: openai
    endpoint: https://api.openai.com/v1/chat/completions
    api_key_env: OPENAI_API_KEY
    model: gpt-4o-mini
    description: "向 OpenAI GPT 发送请求。通用能力强，生态成熟。默认使用 gpt-4o-mini 节省成本。"
    pricing:
      input: 0.15    # gpt-4o-mini
      output: 0.60

  # ── Google Gemini ──
  gemini:
    name: Gemini
    adapter: gemini
    endpoint: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    model: gemini-3-flash-preview
    description: "向 Gemini 发送请求。擅长：长文档、知识广度、创意写作。已启用 Google Search 联网。"
    fallback_to: openai
    features:
      - google_search
    pricing:
      input: 0.10
      output: 0.40

  # ── xAI Grok ──
  grok:
    name: Grok
    adapter: openai
    endpoint: https://api.x.ai/v1/chat/completions
    api_key_env: XAI_API_KEY
    model: grok-3
    description: "向 xAI Grok 发送请求。擅长：实时 X/Twitter 信息、幽默风格、推理。"
    pricing:
      input: 2.00
      output: 10.00

  # ── Perplexity (内置联网) ──
  perplexity:
    name: Perplexity
    adapter: openai
    endpoint: https://api.perplexity.ai/chat/completions
    api_key_env: PERPLEXITY_API_KEY
    model: sonar
    description: "向 Perplexity Sonar 发送请求。擅长：联网搜索、实时信息、引用来源。"
    pricing:
      input: 1.00
      output: 1.00

  # ── Mistral ──
  mistral:
    name: Mistral
    adapter: openai
    endpoint: https://api.mistral.ai/v1/chat/completions
    api_key_env: MISTRAL_API_KEY
    model: mistral-small-latest
    description: "向 Mistral 发送请求。欧洲领先 AI，快速高效，多语言能力强。"
    pricing:
      input: 0.10
      output: 0.30

  # ── Groq (超快推理) ──
  groq:
    name: Groq
    adapter: openai
    endpoint: https://api.groq.com/openai/v1/chat/completions
    api_key_env: GROQ_API_KEY
    model: llama-3.3-70b-versatile
    description: "通过 Groq 超快推理引擎运行开源模型。延迟极低。"
    pricing:
      input: 0.59
      output: 0.79

  # ── OpenRouter (聚合多家模型) ──
  openrouter:
    name: OpenRouter
    adapter: openai
    endpoint: https://openrouter.ai/api/v1/chat/completions
    api_key_env: OPENROUTER_API_KEY
    model: openai/gpt-4o-mini
    description: "通过 OpenRouter 访问 300+ 模型。model 字段改为 anthropic/claude-3.5-sonnet 等即可切换。"
    pricing:
      input: 0.15
      output: 0.60

  # ── DeepSeek ──
  deepseek:
    name: DeepSeek
    adapter: openai
    endpoint: https://api.deepseek.com/chat/completions
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat
    description: "向 DeepSeek 发送请求。擅长：中文内容、代码、数学、逻辑。成本低。"
    fallback_to: gemini
    pricing:
      input: 0.14    # $/M tokens
      output: 0.28

  # ── Qwen (阿里通义千问) ──
  qwen:
    name: Qwen
    adapter: openai
    endpoint: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    api_key_env: DASHSCOPE_API_KEY
    model: qwen-plus
    description: "向通义千问发送请求。擅长：中文语义理解、数学、代码。国内访问稳定。"
    pricing:
      input: 0.40
      output: 1.20

  # ── GLM (智谱 AI) ──
  glm:
    name: GLM
    adapter: openai
    endpoint: https://open.bigmodel.cn/api/paas/v4/chat/completions
    api_key_env: ZHIPUAI_API_KEY
    model: glm-4-plus
    description: "向智谱 GLM 发送请求。擅长：中文对话、Agent 工具调用、长文本。"
    pricing:
      input: 0.50
      output: 0.50

  # ── Moonshot Kimi ──
  kimi:
    name: Kimi
    adapter: openai
    endpoint: https://api.moonshot.cn/v1/chat/completions
    api_key_env: KIMI_API_KEY
    model: moonshot-v1-auto
    description: "向 Kimi (Moonshot) 发送请求。擅长：中文联网搜索、实时信息、国内资讯。"
    system_prefix: "你是 Kimi，擅长联网搜索。当用户的问题涉及实时信息、最新数据、当前时间日期等内容时，请主动使用联网搜索工具获取最新结果。"
    features:
      - web_search
    tool_loop_max: 5
    pricing:
      input: 1.00
      output: 1.00

  # ── Together AI ──
  together:
    name: Together AI
    adapter: openai
    endpoint: https://api.together.xyz/v1/chat/completions
    api_key_env: TOGETHER_API_KEY
    model: meta-llama/Llama-3.3-70B-Instruct-Turbo
    description: "通过 Together AI 运行开源模型。Llama、Mixtral、Qwen 等均可用。"
    pricing:
      input: 0.88
      output: 0.88

  # ── Image generation (Gemini) ──
  # Uses the same GEMINI_API_KEY. Uncomment to enable generate_image tool.
  #
  # gemini-image:
  #   name: Gemini Image
  #   adapter: gemini
  #   endpoint: https://generativelanguage.googleapis.com/v1beta
  #   api_key_env: GEMINI_API_KEY
  #   model: gemini-2.5-flash-image
  #   description: "Generate images with Gemini 2.5 Flash Image. Fast, low cost."
  #   image_generation: true
  #   pricing:
  #     input: 0.10
  #     output: 0.40

  # ── Local models (Ollama / LM Studio / llama.cpp) ──
  # Uncomment and adjust to use local models. No API key needed.
  #
  # ollama:
  #   name: Ollama
  #   adapter: openai
  #   endpoint: http://localhost:11434/v1/chat/completions
  #   model: llama3.2
  #   description: "Local Ollama model. No API key, no cost, full privacy."
  #   pricing:
  #     input: 0
  #     output: 0
  #
  # lmstudio:
  #   name: LM Studio
  #   adapter: openai
  #   endpoint: http://localhost:1234/v1/chat/completions
  #   model: loaded-model
  #   description: "Local LM Studio model."
  #   pricing:
  #     input: 0
  #     output: 0

# 特殊工具配置
tools:
  translate:
    model: deepseek
    description: "用 DeepSeek 做中英互译，质量高成本低。"
  research:
    model: gemini
    description: "用 Gemini 做技术调研和分析总结（已联网）。"
