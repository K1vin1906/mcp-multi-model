# mcp-multi-model 配置文件
# 添加新模型只需在 models 下新增一项，支持 openai / gemini 两种 adapter

defaults:
  max_tokens: 4000
  temperature: 0.7
  timeout_ms: 60000
  max_retries: 2

models:
  deepseek:
    name: DeepSeek
    adapter: openai
    endpoint: https://api.deepseek.com/chat/completions
    api_key_env: DEEPSEEK_API_KEY
    model: deepseek-chat
    description: "向 DeepSeek 发送请求。擅长：中文内容、代码、数学、逻辑。成本低。"
    pricing:
      input: 0.14    # $/M tokens
      output: 0.28   # $/M tokens

  gemini:
    name: Gemini
    adapter: gemini
    endpoint: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    model: gemini-3-flash-preview
    description: "向 Gemini 发送请求。擅长：长文档、知识广度、创意写作。已启用 Google Search 联网。"
    features:
      - google_search
    pricing:
      input: 0.10    # $/M tokens
      output: 0.40   # $/M tokens

  kimi:
    name: Kimi
    adapter: openai
    endpoint: https://api.moonshot.cn/v1/chat/completions
    api_key_env: KIMI_API_KEY
    model: moonshot-v1-auto
    description: "向 Kimi (Moonshot) 发送请求。擅长：中文联网搜索、实时信息、国内资讯。"
    system_prefix: "你是 Kimi，擅长联网搜索。当用户的问题涉及实时信息、最新数据、当前时间日期等内容时，请主动使用联网搜索工具获取最新结果。"
    features:
      - web_search
    tool_loop_max: 5
    pricing:
      input: 1.00    # $/M tokens
      output: 1.00   # $/M tokens

# 特殊工具配置
tools:
  translate:
    model: deepseek
    description: "用 DeepSeek 做中英互译，质量高成本低。"
  research:
    model: gemini
    description: "用 Gemini 做技术调研和分析总结（已联网）。"
